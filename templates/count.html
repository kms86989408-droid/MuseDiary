{% extends "base.html" %}

{% block title %}오늘의 음악 추천{% endblock title %}

{% block content %}

<div class="diary-count-number">
    <div class="back-report-button">
        <!-- 되돌아가기 -->
        <form method="GET" action="{{ url_for('daily_mood') }}" id="back-link">
            <button type="submit" class="btn-jelly-reback">↩ 다시 기록하기</button>
        </form>

        <!-- 분석하기 -->
        <form method="POST" action="{{ url_for('count') }}" id="report">
            <button type="submit" class="btn-jelly-report">분석하기</button>
        </form>
    </div>

    <!-- 4개의 감정 기록 -->
    <div class="diary-emotion">
        <!-- Happy -->
        <div class="card">
            <img src="{{ url_for('static', filename='image/happy.png') }}" style="width: 50px;">
            <span class="count">{{ count_happy }}</span>
            <div class="memo-box">{{ recommend_happy }}</div>
        </div>
        <!-- Angry -->
        <div class="card">
            <img src="{{ url_for('static', filename='image/angry.png') }}" style="width: 50px;">
            <span class="count">{{ count_angry }}</span>
            <div class="memo-box">{{ recommend_angry }}</div>
        </div>
        <!-- Sad -->
        <div class="card">
            <img src="{{ url_for('static', filename='image/sad.png') }}" style="width: 50px;">
            <span class="count">{{ count_sad }}</span>
            <div class="memo-box">{{ recommend_sad }}</div>
        </div>
        <!-- pleasure -->
        <div class="card">
            <img src="{{ url_for('static', filename='image/pleasure.png') }}" style="width: 50px;">
            <span class="count">{{ count_pleasure }}</span>
            <div class="memo-box">{{ recommend_pleasure }}</div>
        </div>
    </div>
</div>
{% endblock content %}
