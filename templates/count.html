{% extends "base.html" %}

{% block content %}
<div class="mood-container">
    <!-- 되돌아가기 -->
    <div class="back-nav">
        <a href="{{ url_for('daily_mood') }}">
            <span style="font-size: 1.5rem;">↩</span>
        </a>
    </div>

    <article style="display: flex; gap: 150px; justify-content: center;">
        <div>{{ count_happy }}</div>
        <div>{{ count_angry }}</div>
        <div>{{ count_sad }}</div>
        <div>{{ count_pleasure }}</div>
    </article>

    <article style="display: flex; gap: 150px; justify-content: center;">
        <div>
            <img src="{{ url_for('static', filename='image/happy.png') }}" style="width: 50px;">
        </div>
        <div>
            <img src="{{ url_for('static', filename='image/angry.png') }}" style="width: 50px;">
        </div>
        <div>
            <img src="{{ url_for('static', filename='image/sad.png') }}" style="width: 50px;">
        </div>
        <div>
            <img src="{{ url_for('static', filename='image/pleasure.png') }}" style="width: 50px;">
        </div>
    </article>

    <article style="display: flex; gap: 150px; justify-content: center;">
        <div>{{ recommend_happy }}</div>
        <div>{{ recommend_angry }}</div>
        <div>{{ recommend_sad }}</div>
        <div>{{ recommend_pleasure }}</div>
    </article>
<form method="POST" action="{{ url_for('count') }}">
    <div class="align">
    <button type="submit" class="btn-jelly-report">
        분석하기
    </button>
</div>
</form>
</div>
{% endblock content %}
