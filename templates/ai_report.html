{% extends "base.html" %}

{% block title %}AI 분석 결과{% endblock title %}

{% block content %}
<div class="page">
    <header class="top">
        <a href="{{ url_for('count') }}" class="back-link" aria-label="뒤로가기">&#8634;</a>
        <div class="title-wrap">
            <div class="title-icon">AI</div>
            <h1 class="title">분석결과 {{ user_name }} 님</h1>
        </div>
    </header>
    <section class="report">
        <p class="message">{{ ai_message or "아직 분석 결과가 없습니다.\ncount 페이지에서 분석하기 버튼을 눌러주세요." }}</p>
    </section>
</div>
{% endblock content %}
