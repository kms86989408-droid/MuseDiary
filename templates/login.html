{% extends "base.html" %}

{% block title %}로그인{% endblock title %}

{% block content %}
<div class="login">
    <h2 class="login-title">Login</h2>
    <form method="post" action="{{ url_for('login') }}" id="login-form">
        <div class="input-group" id="id">
            <input type="text" name="id" placeholder="아이디를 입력하세요" required> 
        </div>
        <div class="input-group" id="pw">
            <input type="password" name="pw" placeholder="비밀번호를 입력하세요" required>
        </div>

        <div class="check-group">
            <label for="remember-check">
                <input type="checkbox" id="remember-check">아이디 저장하기
            </label>
        </div>

        <button type="submit" class="btn-jelly-login">로그인</button>
    </form>
</div>

<p>
    계정이 없나요? &nbsp;
    <a href="{{ url_for('register') }}">   회원가입</a>
</p>
{% endblock content %}
