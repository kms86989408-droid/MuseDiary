{% extends "base.html" %}

{% block title %}회원가입{% endblock title %}

{% block content %}
<div class="register">
    <h2 class="register-title">회원가입</h2>
    <form method="post" action="{{ url_for('register') }}" id="register-form">
        <div class="input-group" id="id">
            <input type="text" name="id" placeholder="아이디를 입력하세요" required> 
        </div>
        <div class="input-group" id="email">
            <input type="email" name="email" placeholder="이메일을 입력하세요" required>
        </div>
        <div class="input-group" id="pw">
            <input type="password" name="pw" placeholder="비밀번호를 입력하세요" required>
        </div>

        <button type="submit" class="btn-jelly-register">회원가입</button>
    </form>
</div>
