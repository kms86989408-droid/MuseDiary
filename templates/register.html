{% extends "base.html" %}

{% block title %}회원가입{% endblock title %}

{% block content %}
<h2>가입하기</h2>
<form class="register-form" action="{{ url_for('register') }}" method="POST">
    <ul>
        <li><input type="text" name="id" placeholder="아이디" required></li>
        <li><input type="email" name="email" placeholder="이메일" required></li>
        <li><input type="password" name="pw" placeholder="비밀번호" required></li>
    </ul>
    <button type="submit">회원가입</button>
</form>
{% endblock content %}
